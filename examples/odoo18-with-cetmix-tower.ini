[virtualenv]
python_version = 3.12
requirements =
  setuptools<82
  lxml>=6
requirements_ignore =
  dataclasses
  lxml

[odoo]
repo = https://github.com/odoo/odoo.git
branch = 18.0

[addons.oca-queue]
repo = https://github.com/OCA/queue.git
branch = 18.0

[addons.oca-web]
repo = https://github.com/OCA/web.git
branch = 18.0

[addons.oca-server-tools]
repo = https://github.com/OCA/server-tools.git
branch = 18.0

[addons.cetmix-tower]
repo = https://github.com/cetmix/cetmix-tower.git
branch = 18.0

[config]
http_port = 8069
gevent_port = 8072
db_host = 127.0.0.1
db_port = 5432
db_name = cetmix_tower
db_user = cetmix_tower
db_password = cetmix_tower
log_level = debug
max_cron_threads = 0
