[virtualenv]
requirements_ignore =
  dataclasses

[odoo]
version = 18.0

[addons.oca-queue]
repo = https://github.com/OCA/queue.git
branch = ${odoo:version}

[addons.oca-web]
repo = https://github.com/OCA/web.git
branch = ${odoo:version}

[addons.oca-server-tools]
repo = https://github.com/OCA/server-tools.git
branch = ${odoo:version}

[addons.cetmix-tower]
repo = https://github.com/cetmix/cetmix-tower.git
branch = ${odoo:version}

[config]
db_host = 127.0.0.1
db_name = odoo
db_user = odoo
db_password = odoo
