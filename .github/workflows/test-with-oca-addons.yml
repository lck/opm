name: Test Create Workspace With OCA Addons

on:
  push:
  pull_request:

jobs:
  odoo-with-oca-addons:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: odoo
          POSTGRES_PASSWORD: odoo
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U odoo -d postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Install Odoo system requirements
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            git \
            postgresql-client \
            build-essential \
            libffi-dev \
            libjpeg-dev \
            libldap2-dev \
            libpq-dev \
            libsasl2-dev \
            libxml2-dev \
            libxslt1-dev \
            zlib1g-dev

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Verify uv
        run: uv --version

      - name: Generate INI file
        shell: bash
        run: |
          cat > odoo-project.ini <<EOF
          [vars]
          version = 18.0

          [virtualenv]
          requirements =
            lxml>=6

          [odoo]
          version = \${vars:version}

          [addons.oca-web]
          repo = https://github.com/OCA/web.git
          branch = \${odoo:version}
          
          [addons.oca-helpdesk]
          repo = https://github.com/OCA/helpdesk.git
          branch = \${odoo:version}

          [config]
          db_host = 127.0.0.1
          db_port = 5432
          db_user = odoo
          db_password = odoo
          db_name = odoo
          EOF

          echo "Generated odoo-project.ini:"
          cat odoo-project.ini

      - name: Create workspace root
        run: mkdir -p odoo-workspace

      - name: Provision Odoo workspace
        run: |
          uv run odt-env ./odoo-project.ini \
            --sync-all \
            --create-venv \
            --root odoo-workspace

      - name: Check generated scripts and folders
        run: |
          test -x odoo-workspace/odoo-scripts/initdb.sh
          test -x odoo-workspace/odoo-scripts/update.sh
          test -d odoo-workspace/odoo-addons/oca-web
          test -d odoo-workspace/odoo-addons/oca-helpdesk
          test -d odoo-workspace/odoo-addons/oca-web/.git
          test -d odoo-workspace/odoo-addons/oca-helpdesk/.git

      - name: Init database with OCA addons
        working-directory: odoo-workspace
        run: ./odoo-scripts/initdb.sh -m web_notify,helpdesk_mgmt

      - name: Verify OCA addons installed in database
        env:
          PGPASSWORD: odoo
        run: |
          psql -h 127.0.0.1 -U odoo -d odoo -c \
            "SELECT name, state
             FROM ir_module_module
             WHERE name IN ('web_notify', 'helpdesk_mgmt')
             ORDER BY name;"

          missing="$(psql -h 127.0.0.1 -U odoo -d odoo -tAc \
            "SELECT string_agg(name, ',')
             FROM ir_module_module
             WHERE name IN ('web_notify', 'helpdesk_mgmt')
               AND state <> 'installed';")"

          test -z "$missing"

      - name: Update addons
        working-directory: odoo-workspace
        run: ./odoo-scripts/update.sh

      - name: Show generated workspace and config
        if: always()
        run: |
          echo "Workspace tree:"
          find odoo-workspace -maxdepth 2 | sort
          echo
          echo "Configs:"
          ls -la odoo-workspace/odoo-configs || true
          echo
          echo "Odoo config odoo-server.conf:"
          cat odoo-workspace/odoo-configs/odoo-server.conf || true
